<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>U.S. demographic dashboard</title><style>body{margin:0;background:#0f172a;color:#e5e7eb;font-family:system-ui;padding:18px}.status{max-width:900px;margin:40px auto;padding:20px;border:1px solid #334155;border-radius:14px;background:#111827}.muted{color:#94a3b8}</style><div class="status"><h1>Loading demographic dashboard...</h1><p class="muted">Restoring the stable dashboard build. If this message stays visible, refresh the page.</p></div><script>fetch('https://raw.githubusercontent.com/simoncgoldstein/us-demographic-dashboard/dashboard-data-source/index.html').then(r=>{if(!r.ok)throw new Error('Fetch failed');return r.text()}).then(html=>{document.open();document.write(html);document.close()}).catch(e=>{document.body.innerHTML='<div class="status"><h1>Dashboard failed to load</h1><p>'+e.message+'</p></div>'})</script>
